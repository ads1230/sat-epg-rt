name: Generate RadioTimes EPG

on:
  schedule:
    # Staggered to run at 05:00 UTC so it doesn't clash with your other actions
    - cron: '0 5 * * *'
  workflow_dispatch: 

jobs:
  update-rt-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # STEP 1: Configure Git once for the whole job
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      # STEP 2: The Seed Run (Heavy Lift)
      - name: Seed RadioTimes Cache (North West)
        run: |
          python radiotimes_script.py "North West"
          git add rt_cache.json logos_rt/ rt_north_west.xml
          git commit -m "Seed RadioTimes Cache (North West)" || echo "No changes to commit"
          git push

      # STEP 3: Run and Save Each Region One By One
      - name: Generate and Save Remaining Regions
        run: |
          # Array of all other regions (excluding North West)
          regions=(
            "Anglia" "Cambridgeshire" "Channel Islands" "Cumbria" "East Midlands" 
            "Henley on Thames" "London" "London (Essex)" "London (Kent)" "London (Thames Valley)" 
            "Meridian (East)" "Meridian (West)" "North East" "North East Midlands" 
            "North Yorkshire" "Northern Ireland" "Northern Oxford" "Republic of Ireland" 
            "Scotland (Borders)" "Scotland (Central)" "Scotland (North)" "South Lakeland" 
            "Wales" "West Dorset" "West England" "West Midlands" "Yorkshire" "Yorkshire & Lincolnshire"
          )
          
          # Loop through, run the script, and push to GitHub immediately after each region
          for region in "${regions[@]}"; do
            echo "--- Starting Region: $region ---"
            
            # Run the script for this specific region
            python radiotimes_script.py "$region"
            
            # Stage the updated cache, new logos, and the newly generated XML file
            git add rt_*.xml rt_cache.json logos_rt/
            
            # Commit and push immediately
            git commit -m "Update RadioTimes EPG: $region" || echo "No changes to commit for $region"
            git push
            
            echo "--- Finished and Saved: $region ---"
          done
